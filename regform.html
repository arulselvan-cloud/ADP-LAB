<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(120deg,#2c3e50,#4ca1af);
    color:white;
    min-height:100vh;
}

.card{
    background: rgba(255,255,255,0.95);
    color:#333;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    padding:25px;
}

.header{
    background: linear-gradient(to right,#ff512f,#dd2476);
    color:white;
    border-radius:20px 20px 0 0;
    padding:20px;
    text-align:center;
}

.btn-custom{
    background: linear-gradient(to right,#36d1dc,#5b86e5);
    border:none;
    color:white;
}

.btn-custom:hover{
    opacity:0.9;
}

label{
    font-weight:600;
}

</style>
</head>

<body>

<div class="container py-5">
<div class="card mx-auto" style="max-width:900px;">

<div class="header mb-4">
    <h2>🏏 Cricket Player Registration</h2>
    <p class="mb-0">Join your favorite IPL team</p>
</div>

<form>

<!-- Row 1 -->
<div class="row">
    <div class="col-md-6 mb-3">
        <label>Full Name</label>
        <input type="text" class="form-control" placeholder="Enter name" required>
    </div>

    <div class="col-md-6 mb-3">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="example@mail.com" required>
    </div>
</div>

<!-- Row 2 -->
<div class="row">
    <div class="col-md-4 mb-3">
        <label>Age</label>
        <input type="number" class="form-control" required>
    </div>

    <div class="col-md-4 mb-3">
        <label>Phone</label>
        <input type="tel" class="form-control" placeholder="9876543210" required>
    </div>

    <div class="col-md-4 mb-3">
        <label>City</label>
        <input type="text" class="form-control" required>
    </div>
</div>

<!-- Row 3 -->
<div class="row">
    <div class="col-md-6 mb-3">
        <label>Preferred Team</label>
        <select class="form-select" required>
            <option disabled selected>Select Team</option>
            <option>CSK</option>
            <option>MI</option>
            <option>RCB</option>
            <option>KKR</option>
        </select>
    </div>

    <div class="col-md-6 mb-3">
        <label>Experience Level</label>
        <select class="form-select">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Professional</option>
        </select>
    </div>
</div>

<!-- Row 4 -->
<div class="row">
    <div class="col-md-6 mb-3">
        <label>Batting Style</label><br>
        <input type="radio" name="bat"> Right-handed
        <input type="radio" name="bat" class="ms-3"> Left-handed
    </div>

    <div class="col-md-6 mb-3">
        <label>Bowling Style</label><br>
        <input type="radio" name="bowl"> Right Arm
        <input type="radio" name="bowl" class="ms-3"> Left Arm
    </div>
</div>

<!-- File Upload -->
<div class="mb-3">
    <label>Upload Photo</label>
    <input type="file" class="form-control">
</div>

<!-- Bio -->
<div class="mb-3">
    <label>Player Bio</label>
    <textarea class="form-control" rows="3" placeholder="Describe your skills..."></textarea>
</div>

<!-- Button -->
<div class="text-center">
    <button class="btn btn-custom px-4">Submit Registration</button>
</div>

</form>

</div>
</div>

</body>
</html>
